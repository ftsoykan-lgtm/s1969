name: TFF Verisini Güncelle

# Her gün 06:00 UTC (Türkiye 09:00) + elle tetikleme
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Tamamlanmış sezonu da zorla yeniden çek (oyuncu profilleri için)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Playwright Chromium yükle
        run: npx playwright install --with-deps chromium

      - name: TFF verisini çek ve Supabase'e yaz
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FORCE_TFF: ${{ inputs.force && '1' || '' }}
        run: npm run tff

      - name: Güncellenen JSON'u commit et (varsa)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/tff-live.json
          git diff --staged --quiet || git commit -m "chore: TFF verisi otomatik güncellendi"
          git push
        continue-on-error: true
